<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
  <style>
    .slide{
      width:210px;
      border:2px solid #333;
      box-shadow:2px 2px 3px #000;
      float: left;
      margin-top:30px;
      margin-right: 20px;
    }
  </style>
  <script src="http://code.jquery.com/jquery-3.3.1.js">
  </script>
  <script>
    $(document).ready(function(){
      $('#sup').click(function(){
        $('.slide').slideUp(3000);
      });
      $('#sdown').click(function(){
        $('.slide').slideDown(3000);
      });
      $('#stoggle').click(function(){
        $('.slide').slideToggle(3000);
      });
    });
  </script>
  </head>
  <body>
    <form>
      <input type="button" id="sup" value="Slide UP">
        <input type="button" id="sdown" value="Slide Down">
          <input type="button" id="stoggle" value="Toggle">
    </form>
    <div class="slide">
      <img src="../image/apple.jpg" alt="">
    </div>
    <div class="slide">
      <img src="../image/apple.jpg" alt="">
    </div>
    <div class="slide">
        <p>겨울엔 사과</p>
      </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <script src="http://code.jquery.com/jquery-3.3.1.js">
    </script>
    <script>
      $(document).ready(function(){
        $("#btn").click(function(){
          $("img").animate({width:"600px"},1000);
          $("img").animate({height:"398px"},1000);
          $("img").animate({width:"50px"},1000);
        })
      });
    </script>
    <<style media="screen">
      input{
        background:yellow;
        width:150px;
        height:30px;
        border:1px solid red;

      }
      img{
        border:2px; solid black;
      }
    </style>

  </head>
  <body>
    <img src="../image/phone.jpg" alt="">
    <br><b>핸드폰이에요</b><br>
    <input id="btn" value="확대하기">
  </body>
</html>
